---
layout: default
---
<div class="post-layout">
    <article class="post-content" style="grid-column: 1 / -1;">
        <header class="post-header">
            <h1 class="post-title">{{ page.title }}</h1>
        </header>
        <div class="post-body" id="post-body">
            {{ content }}
        </div>
    </article>
</div>
