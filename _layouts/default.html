<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" class="{{ site.theme_mode | default: 'dark' }}-mode-init">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Theme CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <!-- SEO -->
  {% seo %}
  {% feed_meta %}

  <!-- Highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body id="body" class="{% if site.theme_mode == 'light' %}light-mode{% endif %}">

  <div class="app-shell">

    <!-- ======= SIDEBAR (Desktop) ======= -->
    {% include sidebar.html %}

    <!-- ======= MAIN ======= -->
    <main class="main-content" id="main-content">
      {{ content }}
    </main>

  </div>

  <!-- ======= MOBILE TOPBAR ======= -->
  {% include topbar.html %}

  <!-- ======= MOBILE BOTTOM NAV ======= -->
  {% include bottom-nav.html %}

  <!-- Search FAB removed — search is available via topbar + bottom-nav -->

  <!-- ======= GLOBAL SEARCH MODAL ======= -->
  {% include search-modal.html %}

  <!-- Scripts -->
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/toc.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/code-copy.js' | relative_url }}"></script>
  <script>
    hljs.highlightAll();
    // Set active nav
    document.querySelectorAll('.sidebar-nav a, .mobile-bottom-nav a').forEach(a => {
      if (a.href === window.location.href || (a.getAttribute('href') === '/' && window.location.pathname === '/')) {
        a.classList.add('active');
      }
    });
  </script>
</body>

</html>
