        <span class="site-title">CHIRPY</span>
    </a>

    <!-- Nav -->
    <ul class="sidebar-nav" role="list">
        <li>

                <span class="nav-icon"><i class="fa-solid fa-compass"></i></span>

    <button class="sidebar-search-btn" id="sidebar-search-input"

    <div class="theme-toggle">
