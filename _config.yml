title: "Aayiram Kanaa"
tagline: "Life · Anime · Data Engineering · Code"
description: "A blog about life, anime, data engineering, and building cool things"
url: ""
baseurl: ""

author:
  name: "Gokul"
  avatar: "/assets/img/favicon.png"
  email: ""
  github: "gokul0205"
  linkedin: ""

# Homepage Hero (configurable — edit here, not in HTML)
hero:
  heading_line1: "Life · Anime ·"
  heading_accent: "Data"
  heading_line2: "· Code"
  subtitle: "A thousand dreams, one blog."
  icon: "fa-solid fa-newspaper"
  image: "/assets/img/hero.png"
  image_alt: "Coding and coffee — hero illustration"

lang: en

theme_mode: dark  # default: dark

# Pagination
pagination:
  enabled: true
  per_page: 9
  permalink: "/page/:num/"
  sort_field: "date"
  sort_reverse: true
  collection: "posts"
  trail:
    before: 2
    after: 2

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-toc

# TOC
toc:
  min_level: 2
  max_level: 3

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      math: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
    values:
      layout: default

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - "*.gem"
  - "*.gemspec"
  - README.md

# Feed
feed:
  posts_limit: 20

# Compress HTML
compress_html:
  clippings: all
  comments: all
